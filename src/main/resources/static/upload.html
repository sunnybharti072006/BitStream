<!-- upload.html - Compact Upload -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BitStream - Upload</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #000000 0%, #121212 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .upload-container {
      width: 100%;
      max-width: 500px;
      padding: 20px;
    }

    .upload-card {
      background: #1A1A1A;
      border-radius: 8px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .back-link {
      color: #888;
      text-decoration: none;
      display: inline-block;
      margin-bottom: 20px;
    }

    .back-link:hover {
      color: #1DB954;
    }

    h2 {
      color: white;
      margin-bottom: 30px;
    }

    .upload-area {
      border: 2px dashed #333;
      border-radius: 4px;
      padding: 40px;
      text-align: center;
      margin-bottom: 20px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .upload-area:hover {
      border-color: #1DB954;
      background: rgba(29,185,84,0.1);
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-group label {
      color: white;
      display: block;
      margin-bottom: 8px;
    }

    .input-group input {
      width: 100%;
      padding: 12px;
      background: #000;
      border: 1px solid #333;
      border-radius: 4px;
      color: white;
    }

    .upload-btn {
      width: 100%;
      padding: 14px;
      background: #1DB954;
      color: black;
      font-weight: 700;
      border: none;
      border-radius: 500px;
      cursor: pointer;
      margin-top: 20px;
    }

    .file-info {
      margin-top: 20px;
      padding: 10px;
      background: #000;
      border-radius: 4px;
      color: #1DB954;
      display: none;
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #1DB954;
      color: black;
      padding: 12px 24px;
      border-radius: 500px;
      font-weight: 600;
    }
  </style>
</head>
<body>
<div class="upload-container">
  <div class="upload-card">
    <a href="index.html" class="back-link">← Back</a>
    <h2>Upload Music</h2>

    <div class="upload-area" onclick="document.getElementById('file').click()">
      <p style="color: #888;">Click to select file</p>
      <input type="file" id="file" style="display: none;" accept="audio/*,video/*" onchange="showFileName(this)">
    </div>

    <div class="file-info" id="fileInfo"></div>

    <div class="input-group">
      <label>Title</label>
      <input type="text" id="title" placeholder="Song title">
    </div>

    <div class="input-group">
      <label>Genre</label>
      <input type="text" id="genre" placeholder="Genre">
    </div>

    <button class="upload-btn" onclick="uploadFile()" id="uploadBtn">Upload</button>
  </div>
</div>

<script>
  const BASE_URL = 'http://localhost:8090';
  const userId = localStorage.getItem('currentUserId');

  if (!userId) {
    window.location.href = 'login.html';
  }

  function showFileName(input) {
    const file = input.files[0];
    if (file) {
      document.getElementById('fileInfo').style.display = 'block';
      document.getElementById('fileInfo').innerHTML = `📁 ${file.name}`;
    }
  }

  async function uploadFile() {
    const title = document.getElementById('title').value;
    const genre = document.getElementById('genre').value;
    const file = document.getElementById('file').files[0];

    if (!title || !file) {
      showToast('Title and file required');
      return;
    }

    const formData = new FormData();
    formData.append('userId', userId);
    formData.append('title', title);
    formData.append('genre', genre || 'Unknown');
    formData.append('file', file);

    try {
      const res = await fetch(`${BASE_URL}/songs/upload`, {
        method: 'POST',
        body: formData
      });

      if (res.ok) {
        showToast('Upload successful!');
        setTimeout(() => window.location.href = 'index.html', 1500);
      } else {
        showToast('Upload failed');
      }
    } catch (error) {
      showToast('Backend error!');
    }
  }

  function showToast(msg) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
  }
</script>
</body>
</html>
