<!-- login.html - Spotify Style Login -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BitStream - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #000000 0%, #121212 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .login-card {
            background: #1A1A1A;
            border-radius: 8px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo svg {
            width: 150px;
            height: 45px;
        }

        .logo h1 {
            display: none;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            color: var(--text-primary);
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .input-group input {
            width: 100%;
            padding: 14px;
            background: #000;
            border: 1px solid #333;
            border-radius: 4px;
            color: white;
            font-size: 1rem;
        }

        .input-group input:focus {
            outline: none;
            border-color: #1DB954;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: #1DB954;
            color: black;
            font-weight: 700;
            border: none;
            border-radius: 500px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.2s ease;
        }

        .login-btn:hover {
            background: #1ed760;
            transform: scale(1.02);
        }

        .register-link {
            text-align: center;
            margin-top: 20px;
            color: #888;
        }

        .register-link a {
            color: #1DB954;
            text-decoration: none;
            font-weight: 600;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1DB954;
            color: black;
            padding: 12px 24px;
            border-radius: 500px;
            font-weight: 600;
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="login-card">
        <div class="logo">
            <svg viewBox="0 0 1134 340" width="150" height="45">
                <path fill="#1DB954" d="M8 171c0 92 76 168 168 168s168-76 168-168S268 4 176 4 8 79 8 171zm230 78c-39-24-89-30-147-17-14 3-24-13-11-24 19-16 35-25 62-29 73-11 129 18 171 47 19 14 4 41-18 31-18-9-38-17-57-24zm40-57c-49-29-120-37-178-20-17 4-28-17-14-29 21-14 43-22 77-27 89-13 164 19 210 57 17 14 2 46-22 35-25-12-48-22-73-31zm4-59c-59-35-155-38-219-21-21 6-35-22-16-33 33-13 79-22 135-19 94 5 163 34 199 64 18 15 3 47-22 36-28-13-53-24-77-37z"/>
            </svg>
        </div>

        <div class="input-group">
            <label>Email address</label>
            <input type="email" id="email" value="sunny@example.com">
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" value="password">
        </div>

        <button class="login-btn" onclick="login()">Log in</button>

        <div class="register-link">
            Don't have an account? <a href="register.html">Sign up for BitStream</a>
        </div>
    </div>
</div>

<script>
    const BASE_URL = 'http://localhost:8090';

    async function login() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {
            const res = await fetch(`${BASE_URL}/users/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            if (res.ok) {
                const user = await res.json();
                localStorage.setItem('currentUserId', user.id);
                localStorage.setItem('currentUserName', user.name);
                window.location.href = 'index.html';
            } else {
                showToast('Invalid credentials');
            }
        } catch (error) {
            showToast('Backend error!');
        }
    }

    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }
</script>
</body>
</html>
